name: Llama Upstream Canary

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

concurrency:
  group: llama-upstream-canary
  cancel-in-progress: false

permissions:
  contents: write

env:
  CACHE_NAMESPACE: mesh-llm
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  latest_upstream:
    runs-on: ubuntu-latest
    outputs:
      old_sha: ${{ steps.sha.outputs.old_sha }}
      new_sha: ${{ steps.sha.outputs.new_sha }}
      changed: ${{ steps.sha.outputs.changed }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Prepare latest llama upstream
        run: just llama-prepare-latest

      - name: Capture upstream SHAs
        id: sha
        run: |
          old_sha="$(tr -d '[:space:]' < third_party/llama.cpp/upstream.txt)"
          new_sha="$(tr -d '[:space:]' < .deps/llama.cpp/.git/mesh-llm-upstream-sha)"
          echo "old_sha=$old_sha" >> "$GITHUB_OUTPUT"
          echo "new_sha=$new_sha" >> "$GITHUB_OUTPUT"
          if [[ "$old_sha" == "$new_sha" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Show no-change summary
        if: steps.sha.outputs.changed == 'false'
        run: |
          {
            echo "## llama.cpp upstream pin update"
            echo
            echo "Pinned llama.cpp upstream is already current: \`${{ steps.sha.outputs.old_sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  linux_build:
    needs: latest_upstream
    if: needs.latest_upstream.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            .github/cache-version.txt
            ci/requirements-ci-python.txt

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build build-essential libdbus-1-dev

      - name: Install Python SDKs
        run: python -m pip install --upgrade pip -r ci/requirements-ci-python.txt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check release-target repo consistency
        run: cargo run -p xtask -- repo-consistency release-targets

      - name: Check embedded client dependency purity
        run: |
          cargo tree -p mesh-llm-client --prefix=none --no-dedupe > /tmp/mesh-client-deps.txt
          FORBIDDEN="keyring|rpassword|hf-hub|dirs|clap|include_dir|rmcp|keyring-core"
          if grep -E "^[[:space:]│├└─-]*($FORBIDDEN)([[:space:]]|$)" /tmp/mesh-client-deps.txt; then
            echo "ERROR: Forbidden dependency found in mesh-client"
            grep -E "^[[:space:]│├└─-]*($FORBIDDEN)([[:space:]]|$)" /tmp/mesh-client-deps.txt
            exit 1
          fi
          echo "PASS: No forbidden dependencies found"

      - name: Build mesh-llm binary (debug)
        run: cargo build -p mesh-llm --bin mesh-llm

      - name: Unit tests
        run: cargo test --lib --tests

      - name: Protocol compatibility matrix
        run: |
          cargo test -p mesh-llm --test protocol_compat_v0_client
          cargo test -p mesh-llm --test protocol_convert_matrix

      - name: Prepare patched latest llama.cpp
        run: scripts/prepare-llama.sh "${{ needs.latest_upstream.outputs.new_sha }}"

      - name: Build llama.cpp (CPU + RPC)
        run: |
          CACHE_FLAGS=()
          if command -v sccache >/dev/null 2>&1; then
            CACHE_FLAGS+=(
              -DCMAKE_C_COMPILER_LAUNCHER=sccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
            )
          fi
          cmake -B llama.cpp/build -S llama.cpp \
            -DGGML_METAL=OFF \
            -DGGML_CUDA=OFF \
            -DGGML_NATIVE=OFF \
            -DGGML_RPC=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLAMA_OPENSSL=OFF \
            "${CACHE_FLAGS[@]}"
          cmake --build llama.cpp/build --config Release -j$(nproc) --target rpc-server llama-server llama-moe-analyze llama-moe-split

      - name: CLI smoke test
        run: |
          target/debug/mesh-llm --version
          target/debug/mesh-llm --help | head -5

      - name: Client-auto boot test
        run: scripts/ci-client-auto-test.sh target/debug/mesh-llm

      - name: Upload Linux inference binaries
        uses: actions/upload-artifact@v6
        with:
          name: llama-canary-linux-inference-binaries
          path: |
            target/debug/mesh-llm
            llama.cpp/build/bin/rpc-server
            llama.cpp/build/bin/llama-server
            llama.cpp/build/bin/llama-moe-analyze
            llama.cpp/build/bin/llama-moe-split
          if-no-files-found: error

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  inference_smoke_tests:
    needs: [latest_upstream, linux_build]
    if: needs.latest_upstream.outputs.changed == 'true' && needs.linux_build.result == 'success'
    uses: ./.github/workflows/smoke.yml
    with:
      artifact_name: llama-canary-linux-inference-binaries
      mesh_binary_target: target/debug/mesh-llm
      cache_key_prefix: llama-canary-
      workflow_cache_file: .github/workflows/llama-upstream-canary.yml

  update_main_pin:
    needs: [latest_upstream, linux_build, inference_smoke_tests]
    if: needs.latest_upstream.outputs.changed == 'true' && needs.linux_build.result == 'success' && needs.inference_smoke_tests.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Check out latest main
        run: |
          git fetch origin main
          git checkout -B main origin/main

      - name: Prepare validated llama upstream
        run: scripts/prepare-llama.sh "${{ needs.latest_upstream.outputs.new_sha }}"

      - name: Update llama upstream pin
        run: just llama-update-pin

      - name: Generate update summary
        run: |
          just llama-summary \
            "${{ needs.latest_upstream.outputs.old_sha }}" \
            "${{ needs.latest_upstream.outputs.new_sha }}" \
            > /tmp/llama-upstream-summary.md

      - name: Commit and push pin update to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add third_party/llama.cpp/upstream.txt LLAMA_CPP_SHA
          if git diff --cached --quiet; then
            echo "No upstream pin changes to commit."
            {
              echo "## llama.cpp upstream pin update"
              echo
              echo "No pin changes were present after validation."
              echo
              cat /tmp/llama-upstream-summary.md
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          git commit -m "Update llama.cpp upstream pin"
          git push origin HEAD:main

          {
            echo "## llama.cpp upstream pin update"
            echo
            echo "Updated \`main\` directly with commit \`$(git rev-parse --short HEAD)\`."
            echo
            cat /tmp/llama-upstream-summary.md
          } >> "$GITHUB_STEP_SUMMARY"
